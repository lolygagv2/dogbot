# WIM-Z treatbot.service stop-timeout cap.
# Installed to /etc/systemd/system/treatbot.service.d/10-timeout.conf
#
# The app does not currently honor SIGTERM, so every stop hits the default
# 90s TimeoutStopSec and then gets SIGKILLed (journal shows
# "Failed with result 'timeout'"). Capping it keeps a healthcheck-triggered
# restart fast (~20s) instead of stalling recovery for a minute and a half.
#
# Proper fix is clean SIGTERM handling in main_treatbot.py; until then this
# bounds the damage.
[Service]
TimeoutStopSec=20
