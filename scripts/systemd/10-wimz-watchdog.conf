# WIM-Z hardware watchdog (Layer A of auto-recovery).
# Installed to /etc/systemd/system.conf.d/10-wimz-watchdog.conf
#
# systemd opens /dev/watchdog (Pi5 bcm2835 SoC watchdog) and pets it every
# RuntimeWatchdogSec/2. If systemd or the kernel hard-locks for ~15s the SoC
# resets the board automatically — recovering the full-lockup / "no SSH,
# needs physical power cycle" failure mode that no userspace timer can catch.
#
# RebootWatchdogSec arms the watchdog during shutdown/reboot too, so a hung
# reboot self-recovers instead of wedging.
#
# NOTE: bcm2835 hardware max timeout is ~15s; do not set RuntimeWatchdogSec
# higher. Takes effect after `systemctl daemon-reexec` or a reboot.
[Manager]
RuntimeWatchdogSec=15
RebootWatchdogSec=2min
