# WIM-Z WiFi stability fix — installed to /etc/modprobe.d/rtw88.conf by
# scripts/setup_device.sh.
#
# The Realtek rtw88 USB WiFi driver's firmware deep link-power-save puts the
# chip into a sleep deep enough to miss beacon frames, causing CTRL-EVENT-
# BEACON-LOSS storms and dropped connections. Disabling it keeps the radio
# awake and stable. Inert on devices that don't load rtw88.
options rtw88_core disable_lps_deep=1
