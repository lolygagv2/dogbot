# Silent Guardian Mode Configuration
# WIM-Z's PRIMARY product mode - bark-focused passive monitoring with positive reinforcement

mode_config:
  name: "Silent Guardian"
  description: "Passive bark monitoring with escalating intervention and treat rewards"
  session_duration_hours: 8
  max_treats_per_session: 11

# Dog identification via ArUco markers
dog_identification:
  elsa:
    aruco_id: 315
    audio_name: "elsa.mp3"
    audio_quiet: "quiet.mp3"  # Generic quiet for now
    audio_come: "dogs_come.mp3"
  bezik:
    aruco_id: 832
    audio_name: "bezik.mp3"
    audio_quiet: "quiet.mp3"
    audio_come: "dogs_come.mp3"

# Bark detection thresholds
# TUNED 2026-04-15: Lowered thresholds - dogs weren't triggering enough, too strict
bark_detection:
  threshold: 2                    # Barks to trigger intervention (lowered from 3)
  window_seconds: 60              # Time window for counting barks
  confidence_minimum: 0.35        # Lowered from 0.45 for more sensitivity
  loudness_threshold_db: -28      # Much more sensitive (was -21, dogs had to be VERY loud)
  # Fast-escalation: when sustained barks/minute exceeds this, skip straight to L4
  # (calming music) instead of climbing one level per intervention. 0 = disabled.
  # App "punishment level" slider maps to this (Max-aggressive=10, Min-aggressive=90,
  # default 30). Existing climb-the-levels logic still runs underneath.
  fast_escalation_bpm: 0
  # device: unset — auto-detect via audio.bark_buffer_arecord.find_usb_audio_device().
  # Probes PipeWire 'default' first; if silent, falls back to plughw:{usb_card},0
  # using the live arecord -l card number (USB enumerates dynamically across boots).

# Intervention sequences by escalation level
intervention_sequences:
  # Level 1: First bark event in the hour
  level_1:
    name: "Initial Quiet Request"
    commands:
      - type: audio
        file: "$dog_quiet"        # "[Dog name], quiet" or just "quiet.mp3"
        wait_after: 1.0
    quiet_required_seconds: 20
    reward_on_success: true

  # Level 2: Second bark event within 1 hour
  level_2:
    name: "Firm Quiet Request"
    commands:
      - type: audio
        file: "quiet.mp3"
        wait_after: 0.5
      - type: audio
        file: "quiet.mp3"
        wait_after: 0.5
      - type: audio
        file: "no.mp3"
        wait_after: 1.0
      - type: audio
        file: "dogs_come.mp3"
        wait_after: 2.0
      - type: audio
        file: "quiet.mp3"
        wait_after: 1.0
    quiet_required_seconds: 30
    reward_on_success: true

  # Level 3: Fourth bark event within 1 hour — physical attention sequence
  # Runs BEFORE the calming-music level. Quick in-place fwd/back/left/right
  # movements to break the dog's focus. See _run_movement_sequence().
  level_3:
    name: "Physical Attention Sequence"
    commands:
      - type: audio
        file: "quiet.mp3"
        wait_after: 1.0
    movement_cycles: 3            # fwd/back/left/right counts as one cycle
    move_duration_seconds: 0.4    # each move ~300-500ms (quick)
    move_speed_pct: 50            # drive PWM % (safe band 40-70; bus clamps 70)
    cycle_pause_seconds: 5.0      # pause between cycles (not after the last)
    quiet_required_seconds: 30
    reward_on_success: true

  # Level 4+: Fifth or more bark events within 1 hour
  level_4:
    name: "Calming Music Mode"
    commands:
      - type: audio
        file: "quiet.mp3"
        wait_after: 1.0
    play_calming_music: true
    calming_music_file: "songs/default/mozart_piano.mp3"
    quiet_periods_required: 2
    quiet_period_duration: 20     # Each quiet period must be 20 seconds
    reduce_treats: true           # Fewer treats at this escalation level
    reward_on_success: true

# Reward sequence (when dog successfully achieves quiet)
reward_sequence:
  enabled: true
  commands:
    - type: audio
      file: "dogs_come.mp3"
      wait_after: 2.0
    - type: audio
      file: "treat.mp3"           # "Do you want a treat?"
      wait_after: 10.0
    - type: camera_scan           # Scan to find dog via ArUco
      duration: 5.0
    - type: audio
      file: "sit.mp3"
      wait_after: 1.5
    - type: audio
      file: "quiet.mp3"
      wait_after: 3.0

  # Conditions for treat dispensing
  treat_conditions:
    quiet_only_seconds: 10        # 10 seconds of quiet = treat
    sit_and_quiet_seconds: 5      # OR 5 seconds of sit + quiet = treat

# Escalation tracking
escalation:
  window_minutes: 60              # Events within this window increase level
  reset_after_quiet_minutes: 15   # 15 min continuous quiet → reset to level 0 with ceremony
  max_level: 4                    # Cap at level 4 (1=verbal, 2=firm, 3=movement, 4=music)

# Session limits
session_limits:
  max_treats: 11                  # Maximum treats per 8-hour session
  max_interventions_per_hour: 6  # Safety limit
  min_time_between_treats: 120     # Minimum seconds between treats

# Logging configuration
logging:
  log_barks: true
  log_interventions: true
  log_escalations: true
  log_treats: true
  log_quiet_periods: true

  # Analytics fields to track
  analytics:
    - bark_frequency
    - intervention_count
    - success_duration
    - escalation_levels
    - treats_dispensed
    - quiet_periods_achieved

# Audio file paths (relative to /home/morgan/dogbot/VOICEMP3/)
audio_paths:
  base: "/home/morgan/dogbot/VOICEMP3"
  talks: "/home/morgan/dogbot/VOICEMP3/talks"
  songs: "/home/morgan/dogbot/VOICEMP3/songs"

  # Specific files
  quiet: "talks/quiet.mp3"
  no: "talks/no.mp3"
  come: "talks/dogs_come.mp3"
  sit: "talks/sit.mp3"
  treat: "talks/treat.mp3"
  good_dog: "talks/good_dog.mp3"
  elsa: "talks/elsa.mp3"
  bezik: "talks/bezik.mp3"
  calming_music: "songs/default/mozart_piano.mp3"

# Camera settings for Silent Guardian mode
camera:
  mode: "fixed"                   # Stationary wide shot
  scan_on_bark: true              # Only scan when looking for dog after intervention
  scan_duration: 15.0              # Seconds to scan
  aruco_detection: true           # Enable ArUco for dog identification
