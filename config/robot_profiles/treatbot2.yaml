battery:
  # Per-unit voltage-divider calibration. TB2's divider reads high on the class
  # default (4.308): 3.843V ADC -> 16.55V (showed 94%) while the pack measured
  # 14.33V on a meter. Factor = 14.33 / 3.843 = 3.729 brings the reading true.
  calibration_factor: 3.729
camera:
  coach_pan_max: 145
  coach_pan_min: 55
  coach_tilt_max: 85
  coach_tilt_min: 25
  pan_center: 134
  pan_max: 270
  pan_min: -10
  rotation: 0
  tilt_center: 90
  tilt_max: 250
  tilt_min: 45
controller:
  max_rpm: 100
  max_speed: 80
  min_pwm_threshold: 0
  motor_calibration:
    left_multiplier: 0.75
    right_multiplier: 1.0
  pid:
    kd: 0.0
    ki: 0.0
    kp: 1.0
  turn_speed_factor: 0.8
  use_pid_control: false
  xbox:
    joystick_deadzone: 0.3
    joystick_scale: 1.0
description: Backup unit with motor compensation required
dispenser:
  ihold: 5
  irun: 31
  max_retries: 3
  microstepping: 8
  reverse_steps: 75
  sgthrs: 0
  shaft_invert: true
  step_delay: 0.006
  steps_per_slot: 137
robot_id: treatbot2
servo:
  slow_pulse: 1600
