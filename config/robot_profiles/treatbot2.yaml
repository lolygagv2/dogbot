battery:
  # Per-unit voltage-divider calibration = divider ratio (V_batt / V_adc).
  # 2026-05-30: the old divider fed >3.6V into the 3.3V-powered ADS1115 A0 across
  # the whole 12-16.8V range, so the input clamped (~3.84V) and the reading froze
  # (any factor just rescaled the frozen value). Divider replaced with 100k (top) /
  # 20k (bottom) = 6:1 ratio so 16.8V -> 2.80V at A0, fully on-scale. Factor 6.0 is
  # nominal; fine-tune to (meter_V / raw_adc_V) after the swap. See memory
  # project_battery_ads_clamp.
  calibration_factor: 6.0
camera:
  coach_pan_max: 145
  coach_pan_min: 55
  coach_tilt_max: 85
  coach_tilt_min: 25
  pan_center: 134
  pan_max: 270
  pan_min: -10
  rotation: 180
  tilt_center: 90
  tilt_max: 250
  tilt_min: 45
controller:
  max_rpm: 100
  max_speed: 80
  min_pwm_threshold: 0
  motor_calibration:
    left_multiplier: 0.75
    right_multiplier: 1.0
  pid:
    kd: 0.0
    ki: 0.0
    kp: 1.0
  turn_speed_factor: 0.8
  use_pid_control: false
  xbox:
    joystick_deadzone: 0.3
    joystick_scale: 1.0
description: Backup unit with motor compensation required
dispenser:
  # IR through-beam dispense confirmation at the chute (aligned + live-verified
  # 2026-07-10 on this unit — pin idles HIGH when beam locked, card swipe -> LOW).
  # Wiring per docs/NEW_ROBOT_SETUP.md §beam; OUT on GPIO7 (pin 26), freed from
  # SPI CE1 by dtoverlay=spi0-1cs, external 1K pull-up OUT->3.3V (pin 17).
  # Polarity: beam intact = HIGH, break = LOW -> falling edge = active_low true.
  beam_enabled: true
  beam_pin: 7
  beam_active_low: true
  beam_timeout_s: 4.0
  ihold: 5
  irun: 31
  max_retries: 3
  microstepping: 8
  reverse_steps: 75
  sgthrs: 0
  shaft_invert: true
  step_delay: 0.006
  steps_per_slot: 137
robot_id: treatbot2
servo:
  slow_pulse: 1600
