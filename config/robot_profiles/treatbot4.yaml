# TreatBot4 — Cytron motor driver + 9V brushed motors (no encoders), IMX708 Pi Camera Module 3 Wide NoIR
# Hardware delta vs treatbot1/2: replaced L298N + 6V DFRobot encoder motors with Cytron driver + 9V brushed,
# and IMX500 → IMX708 wide-angle camera. PID disabled because 9V motors lack encoders.
# 2026-05-24: swapped to IMX708 Wide NoIR (IR-cut filter removed) for upcoming night-vision mode.

robot_id: "treatbot4"
description: "Production unit #4 — Cytron motor driver, 9V brushed motors (no encoders), IMX708 Wide NoIR"

# Camera settings (detector.py) — IMX708 Pi Camera Module 3 Wide NoIR
camera:
  rotation: 0  # degrees clockwise (0, 90, 180, 270) — re-tune per unit
  # Gimbal servo limits — pan seeded from treatbot3, tilt calibrated 2026-05-17
  # after tilt-servo replacement (new servo's level position = code-angle 43).
  pan_min: -89
  pan_max: 269
  tilt_min: -10     # ~50° physical down from level (100 code-units below center)
  tilt_max: 143     # ~50° physical up from level (100 code-units above center)
  pan_center: 67    # Where camera physically looks dead-ahead (treatbot3 value)
  tilt_center: 43   # Calibrated level horizon (new tilt servo, 2026-05-17)
  # Coach mode auto-tracking limits — 30% inset from full range
  coach_pan_min: 18
  coach_pan_max: 162
  coach_tilt_min: 3
  coach_tilt_max: 83

  # Daytime image profile — NoIR baseline (no IR-cut filter)
  # AWB cannot fully solve NoIR daytime color (green channel dominant, IR bleeds into red,
  # ColourGains only controls R+B). Best result: lock AWB-chosen gains statically + low saturation
  # to mute residual false-color in skin/foliage. Bench-tuned 2026-05-24 against bald-head test target.
  # Non-skin neutrals (walls, fabric, plastic) look correct; will be replaced by NIGHT_PROFILE
  # when modes/night_mode_controller.py switches us into IR-illuminated mode.
  awb_enable: false
  colour_gains: [0.887, 1.52]   # (red_gain, blue_gain) — green is implicit reference
  saturation: 0.85              # moderate — keeps color life; minor NoIR green tint on skin acceptable
  contrast: 1.05                # slight bump for definition
  sharpness: 1.0
  brightness: 0.0

# Dispenser settings — NEMA 17 stepper + TMC2209 (dispenser.py)
# 2026-05-25: UART finally working after fixing PDN_UART wire to pin 4, VIO to 3V3, GND shared,
# and 1K resistor on Pi TX leg only (pin 8). Settings below now actually take effect.
dispenser:
  steps_per_slot: 147       # ~32.4° per dispense (137 × 1.05, dialed in live 2026-05-26)
  step_delay: 0.0060         # Half-period per step (slower = more torque on torque-speed curve)
  max_retries: 3            # Anti-jam retry attempts per dispense
  reverse_steps: 88         # Steps to reverse during anti-jam
  irun: 31                  # TMC2209 run current (0-31, 31=max ~1.1A)
  ihold: 5                  # TMC2209 hold current (low to save battery)
  microstepping: 8          # Reverted from 4 (which paired with steps_per_slot=137 would 2x-rotate)
  sgthrs: 0                 # StallGuard disabled — broken at low RPM regardless
  chopper_mode: "spreadcycle"  # Full rated torque (audible whine); now actually applied via UART

# Servo settings (servo_controller.py) — pan/tilt only, winch servo removed
servo:
  slow_pulse: 1560  # legacy — no longer used for dispenser

# Battery monitor calibration (services/power/battery_monitor.py)
# treatbot4 uses a LOW-ratio voltage divider (~5.6:1), NOT treatbot3's high-ratio (~54:1).
# Calibrated 2026-05-25 against multimeter: 15.43V battery -> 2.7368V at A0 -> factor 5.638.
battery:
  calibration_factor: 5.638

# Motor/Controller settings (xbox_hybrid_controller.py)
controller:
  driver: "cytron"        # Selects MotorControllerCytron in services/motion/motor.py dispatch
  max_speed: 80           # Capped speed percentage
  turn_speed_factor: 0.8  # Multiplier for turn smoothness
  max_rpm: 110            # Unused on this unit (no encoder feedback) — kept for schema compatibility
  use_pid_control: false  # Required false: 9V motors have no encoders, no PID feedback possible
  min_pwm_threshold: 0    # Minimum PWM to overcome motor deadzone

  # Per-motor calibration for hardware imbalance — re-tune per unit during bring-up
  motor_calibration:
    left_multiplier: 1.0
    right_multiplier: 1.0

  # Cytron MDD10A wiring + per-motor inversion (BCM pin numbers) — same as treatbot3
  cytron:
    left_dir_pin: 17     # physical pin 11
    left_pwm_pin: 13     # physical pin 33
    right_dir_pin: 27    # physical pin 13
    right_pwm_pin: 19    # physical pin 35
    left_invert: false   # flip true if left wheel spins backward at bring-up
    right_invert: true   # right motor wired with reversed polarity (verified 2026-05-17 bring-up — same as treatbot3)
    pwm_freq_hz: 1000    # MDD10A supports up to 20kHz; 1kHz is quiet + responsive
    max_pwm_pct: 70      # 9V motors on 14.8V (nominal) / 16.8V (full) rail

  # Xbox controller calibration
  xbox:
    joystick_deadzone: 0.30   # Ignore stick values below this (drift compensation)
    joystick_scale: 1.0       # Multiply stick output

  # PID tuning parameters — unused while use_pid_control=false
  pid:
    kp: 1.0
    ki: 0.0
    kd: 0.0

# HARDWARE_NOTE:
# - Motor driver: Cytron MDD10A (10A dual-channel, DIR + PWM per motor). Driver in
#   core/hardware/motor_controller_cytron.py, dispatched by core/motor_command_bus.py
#   when controller.driver == "cytron".
# - Camera: IMX708 Pi Camera Module 3 Wide NoIR (IR-cut filter removed). Boot config notes
#   in .claude/hardware_specs.md (commit 90e2399). On Pi 5 this is wired to CSI0 (cam0) —
#   cam1 port on this unit appears damaged (see 2026-05-24 troubleshooting).
#   Verify with `rpicam-hello --list-cameras` post-deploy.
