# TreatBot1 Primary Unit - Good Motors
# Hardware: Matched 1.6Ω + 1.7Ω DC motors, well-calibrated servo

robot_id: "treatbot1"
description: "Primary demo unit with matched motors"

# Camera settings (detector.py)
camera:
  rotation: 0  # degrees clockwise (0, 90, 180, 270)
  # Gimbal servo limits (pan_tilt.py)
  pan_min: 10
  pan_max: 200
  tilt_min: 20
  tilt_max: 160
  pan_center: 110   # Calibrated center (may differ from mechanical 90)
  tilt_center: 90
  # Coach mode auto-tracking limits (tighter to avoid ceiling/floor)
  coach_pan_min: 55
  coach_pan_max: 145
  coach_tilt_min: 25
  coach_tilt_max: 85

# Dispenser settings — NEMA 17 stepper + TMC2209 (dispenser.py)
dispenser:
  steps_per_slot: 137       # Microsteps to advance one treat slot (calibrated)
  step_delay: 0.006         # Half-period per step in seconds (12ms/step = MEDIUM speed)
  max_retries: 3            # Anti-jam retry attempts per dispense
  reverse_steps: 40         # Steps to reverse during anti-jam
  irun: 31                  # TMC2209 run current (0-31, 31=max ~1.1A)
  ihold: 5                  # TMC2209 hold current (low to save battery)
  microstepping: 8          # Microstepping multiplier (MRES=5)
  sgthrs: 0                 # StallGuard disabled — SG_RESULT=0 at our low speed, any threshold causes false positives

# Servo settings (servo_controller.py) — pan/tilt only, winch servo removed
servo:
  slow_pulse: 1560  # legacy — no longer used for dispenser

# Motor/Controller settings (xbox_hybrid_controller.py)
controller:
  max_speed: 80           # Capped speed percentage
  turn_speed_factor: 0.8  # Multiplier for turn smoothness
  max_rpm: 110            # Target RPM for PID control
  use_pid_control: false  # DISABLED FOR TESTING - bypasses PID, uses direct PWM
  min_pwm_threshold: 0    # Minimum PWM to overcome motor deadzone (0 = no threshold)

  # Per-motor calibration for hardware imbalance
  motor_calibration:
    left_multiplier: 1.2
    right_multiplier: 0.9

  # Xbox controller calibration
  xbox:
    joystick_deadzone: 0.30   # Ignore stick values below this (increased for drift)
    joystick_scale: 1.0       # Multiply stick output (if controller doesn't reach 1.0)

  # PID tuning parameters
  pid:
    kp: 1.0                   # Proportional gain
    ki: 0.0                   # Integral gain
    kd: 0.0                   # Derivative gain
