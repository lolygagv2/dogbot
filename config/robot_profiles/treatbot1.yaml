# TreatBot1 Primary Unit - Good Motors
# Hardware: Matched 1.6Ω + 1.7Ω DC motors, well-calibrated servo

robot_id: "treatbot1"
description: "Primary demo unit with matched motors"

# Camera settings (detector.py)
camera:
  rotation: 180  # degrees clockwise (0, 90, 180, 270) — camera mounted inverted (verified 2026-07-10)
  # Gimbal servo limits (pan_tilt.py)
  pan_min: -180
  pan_max: 200
  tilt_min: 50
  tilt_max: 280
  pan_center: 120   # Calibrated center (may differ from mechanical 90)  (Right is negative, left is positive)
  tilt_center: 60
  # Coach mode auto-tracking limits (tighter to avoid ceiling/floor)
  coach_pan_min: 55
  coach_pan_max: 145
  coach_tilt_min: 25
  coach_tilt_max: 85

# Dispenser settings — NEMA 17 stepper + TMC2209 (dispenser.py)
dispenser:
  steps_per_slot: 137       # Microsteps to advance one treat slot (calibrated)
  step_delay: 0.006         # Half-period per step in seconds (12ms/step = MEDIUM speed)
  max_retries: 3            # Anti-jam retry attempts per dispense
  reverse_steps: 40         # Steps to reverse during anti-jam
  irun: 31                  # TMC2209 run current (0-31, 31=max ~1.1A)
  ihold: 5                  # TMC2209 hold current (low to save battery)
  microstepping: 8          # Microstepping multiplier (MRES=5)
  sgthrs: 0                 # StallGuard disabled — SG_RESULT=0 at our low speed, any threshold causes false positives

  # IR through-beam dispense confirmation at the chute (see tb3 for wiring).
  #   Receiver OUT -> pin 26 (GPIO7, freed from SPI CE1 via dtoverlay=spi0-1cs)
  #   + external 1K pull-up OUT->3.3V (pin 17).  NOT GPIO26 (Pololu kill-pulse).
  # Polarity (verified 2026-07-10 on the working sensor): beam intact = HIGH,
  #   treat break = LOW -> falling edge -> active_low true. Confirmed steady
  #   HIGH idle via `pinctrl get 7`; pin/pull-up proven good (bare = HIGH).
  # History: first receiver module was dead (output stuck LOW regardless of
  #   beam); replaced. Pi pad + software were fine all along.
  beam_enabled: true
  beam_pin: 7               # Through-beam receiver output (config/pins.py TREAT_BEAM)
  beam_active_low: true     # beam intact = HIGH, break = LOW (dark-on sensor)
  beam_timeout_s: 4.0

# Servo settings (servo_controller.py) — pan/tilt only, winch servo removed
servo:
  slow_pulse: 1560  # legacy — no longer used for dispenser

# Battery monitor (services/power/battery_monitor.py) — ADS1115 ADC on A0.
# Each ADS1115 + voltage-divider pair is individually off, so calibration is
# per-unit. Calibrated 2026-05-29: A0 read 3.839V raw at a metered 13.8V pack
# -> factor 13.8 / 3.839 = 3.595. (Class default 4.308 gave a false 16.5V/94%.)
# To recalibrate: measure pack with a meter, then factor = meter_V / adc_voltage
# (adc_voltage is in GET /battery status).
battery:
  calibration_factor: 3.595

# Motor/Controller settings (xbox_hybrid_controller.py)
controller:
  max_speed: 80           # Capped speed percentage
  turn_speed_factor: 0.8  # Multiplier for turn smoothness
  max_rpm: 110            # Target RPM for PID control
  use_pid_control: false  # DISABLED FOR TESTING - bypasses PID, uses direct PWM
  min_pwm_threshold: 0    # Minimum PWM to overcome motor deadzone (0 = no threshold)

  # Per-motor calibration for hardware imbalance
  motor_calibration:
    left_multiplier: 1.2
    right_multiplier: 0.9

  # Xbox controller calibration
  xbox:
    joystick_deadzone: 0.30   # Ignore stick values below this
    joystick_scale: 1.0       # Multiply stick output (if controller doesn't reach 1.0)
    # Per-axis hardware rest offset for worn/off-center sticks (raw -1..1 space).
    # _calibrate_stick() subtracts this and rescales each side back to +/-1.0.
    # Leave at 0.0 for a healthy controller; only set if a stick is measurably
    # off-center AND its rest position is stable (a wandering rest can't be
    # calibrated). 0.0 = no-op.
    stick_centers:
      left_x: 0.0
      left_y: 0.0
      right_x: 0.0
      right_y: 0.0

  # PID tuning parameters
  pid:
    kp: 1.0                   # Proportional gain
    ki: 0.0                   # Integral gain
    kd: 0.0                   # Derivative gain
